name: Sync Colab notebooks to Google Drive

on:
  push:
    branches:
      - main
    paths:
      - "run_colab.ipynb"
      - "data/**"
      - "output/*.csv"
      - "src/**/*.ipynb"
      - "src/**/*.py"
      - "config/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/sync-colab-drive.yml"
  workflow_dispatch:

concurrency:
  group: sync-colab-drive-main
  cancel-in-progress: true

jobs:
  sync:
    name: Upload Colab runtime files and datasets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GDRIVE_FOLDER_ID: ${{ vars.GDRIVE_FOLDER_ID }}
      GDRIVE_RCLONE_CONF: ${{ secrets.GDRIVE_RCLONE_CONF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Google Drive settings
        run: |
          test -n "$GDRIVE_FOLDER_ID" || {
            echo "Repository variable GDRIVE_FOLDER_ID is required."
            exit 1
          }

          test -n "$GDRIVE_RCLONE_CONF" || {
            echo "Repository secret GDRIVE_RCLONE_CONF is required."
            exit 1
          }

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone rsync

      - name: Prepare upload bundle
        run: |
          STAGING="$RUNNER_TEMP/colab-drive-sync"
          mkdir -p "$STAGING"

          mkdir -p "$STAGING/src"

          if [ -d src ]; then
            rsync -av \
              --exclude='.ipynb_checkpoints/***' \
              --exclude='__pycache__/***' \
              --include='*/' \
              --include='*.ipynb' \
              --include='*.py' \
              --exclude='*' \
              src/ "$STAGING/src/"
          else
            echo "Directory src/ does not exist."
            exit 1
          fi

          if [ -d data ]; then
            rsync -av data/ "$STAGING/data/"
          fi

          if [ -d output ]; then
            mkdir -p "$STAGING/output"
            rsync -av \
              --include='*/' \
              --include='*.csv' \
              --exclude='*' \
              output/ "$STAGING/output/"
          fi

          if [ -d config ]; then
            rsync -av config/ "$STAGING/config/"
          fi

          if [ -f run_colab.ipynb ]; then
            cp run_colab.ipynb "$STAGING/"
          fi

          find . -maxdepth 1 -type f \( \
            -name 'requirements*.txt' -o \
            -name 'pyproject.toml' \
          \) -exec cp {} "$STAGING/" \;

          echo "Prepared upload bundle:"
          find "$STAGING" -type f | sort

      - name: Configure rclone Google Drive remote
        run: |
          mkdir -p ~/.config/rclone

          printf '%s' "$GDRIVE_RCLONE_CONF" > ~/.config/rclone/rclone.conf

          echo "Checking rclone remote..."
          rclone config show colab_drive --config ~/.config/rclone/rclone.conf >/dev/null

      - name: Copy bundle to Google Drive
        run: |
          STAGING="$RUNNER_TEMP/colab-drive-sync"

          rclone copy "$STAGING/" colab_drive: \
            --create-empty-src-dirs \
            --drive-root-folder-id "$GDRIVE_FOLDER_ID" \
            --drive-acknowledge-abuse \
            --progress
